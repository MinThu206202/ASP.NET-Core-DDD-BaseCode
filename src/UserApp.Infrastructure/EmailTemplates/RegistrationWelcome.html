<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background-color:#f4f7fb;font-family:'Segoe UI',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f7fb;padding:40px 16px;">
        <tr>
            <td align="center">
                <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06);">
                    <tr>
                        <td style="padding:40px 32px 0 32px;text-align:center;">
                            <div style="width:48px;height:48px;background:#059669;border-radius:12px;margin:0 auto 20px auto;display:flex;align-items:center;justify-content:center;">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                                    <polyline points="22 4 12 14.01 9 11.01" />
                                </svg>
                            </div>
                            <h1 style="margin:0 0 6px 0;font-size:24px;font-weight:700;color:#1e293b;letter-spacing:-0.3px;">Welcome, {{FULLNAME}}!</h1>
                            <p style="margin:0;font-size:14px;color:#64748b;line-height:1.5;">Your account has been created successfully. You can now sign in and start using UserApp.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:28px 32px;text-align:center;">
                            <a href="{{LOGIN_URL}}" style="display:inline-block;background:#1e293b;color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;padding:14px 40px;border-radius:10px;">Sign In to Your Account</a>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 32px 32px 32px;text-align:center;">
                            <p style="margin:0;font-size:13px;color:#94a3b8;line-height:1.5;">If you didn't create this account, please ignore this email or contact support.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;text-align:center;">
                            <p style="margin:0;font-size:12px;color:#94a3b8;">&copy; {{YEAR}} UserApp. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
